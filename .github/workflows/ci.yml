name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: python -m pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest)
        run: pytest -q

      - name: Run example workflow (mock)
        run: forgeflow run examples/support_triage.yaml --mock --yes

      - name: Run example evals (mock)
        run: |
          forgeflow eval examples/evals/support_triage_eval.yaml
          forgeflow eval examples/evals/sales_lead_qualifier_eval.yaml
